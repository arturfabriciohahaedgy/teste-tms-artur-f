<div class="flex flex-row justify-between">
  <h1 class="text-4xl">Motoristas</h1>
  <p-button label="Cadastrar motorista" icon="pi pi-plus" (click)="openDialog()" />
</div>

<p-table [value]="drivers" [tableStyle]="{ 'min-width': '50rem' }" class="mt-4">
  <ng-template #header>
    <tr>
      <th>Nome</th>
      <th>Categoria</th>
      <th>Data de criação</th>
      <th>Data de última edição</th>
      <th>Ativo</th>
      <th>Ações</th>
    </tr>
  </ng-template>
  <ng-template #body let-driver>
    <tr>
      <td>{{ driver.name }}</td>
      <td>{{ driver.cnh_category }}</td>
      <td>{{ driver.created_at | date }}</td>
      <td>{{ driver.edited_at ?? '-' }}</td>
      <td>
        @if (driver.active) {
          <i class="pi pi-check-circle" style="color: #008000"></i>
        } @else {
          <i class="pi pi-times-circle" style="color: #880808"></i>
        }
      </td>
      <td>
        <div class="flex gap-2">
          <p-button icon="pi pi-pencil" severity="contrast" (click)="editDialog(driver.id)" />
          <p-button icon="pi pi-times" severity="danger" (click)="confirmInactivation($event)" />
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>

<!-- form -->
<div class="card flex justify-center">
  <p-dialog
    header="Cadastro de motorista"
    [modal]="true"
    [(visible)]="formDialogVisible"
    [style]="{ width: '500px' }"
  >
    <form [formGroup]="driverForm">
      <div class="flex gap-2">
        <div class="flex flex-col">
          <label class="font-semibold">Nome</label>
          <input pInputText formControlName="name" class="flex-auto" />
        </div>
        <div class="flex flex-col">
          <label class="font-semibold">CPF</label>
          <input pInputText formControlName="cpf" class="flex-auto" />
        </div>
      </div>

      <div class="flex gap-2">
        <div class="flex flex-col">
          <label class="font-semibold">Número da CNH</label>
          <input pInputText formControlName="cnh_number" class="flex-auto" />
        </div>
        <div class="flex flex-col">
          <label class="font-semibold">Telefone</label>
          <input pInputText formControlName="phone" class="flex-auto" />
        </div>
      </div>

      <div class="mt-2 items-center justify-center">
        <div class="flex items-center gap-4">
          <label class="font-semibold">Categoria CNH</label>
          <p-select
            class="w-fit"
            formControlName="cnh_category"
            [options]="optionsCNH"
            optionLabel="id"
          />
        </div>
      </div>
      <div class="flex justify-end gap-2">
        <p-button label="Cancelar" severity="secondary" (click)="formDialogVisible = false" />
        <p-button type="submit" label="Salvar" (click)="formDialogVisible = false" />
      </div>
    </form>
  </p-dialog>
</div>

<p-confirmdialog />
<p-toast />
